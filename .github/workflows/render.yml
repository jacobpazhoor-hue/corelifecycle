name: render

# Free cloud render for CoreLifecycle. The 8GB Mac kept thrashing on the local render;
# this runs the heavy render on a 16GB GitHub-hosted runner instead. It REGENERATES audio
# (edge-tts + numpy) from the committed content.py, renders the episode + Short, masters the
# audio to -14 LUFS, and uploads the finished files as an ARTIFACT. It never touches YouTube —
# the Mac downloads the artifact, runs the LLM reviewer on the real frames, and publishes locally
# (so the OAuth token never has to live in GitHub). Trigger: workflow_dispatch (the local
# autopilot fires it via the REST API after the creative agent commits the new content).

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "slug being rendered (for the run name / artifact)"
        required: false
        default: "episode"

run-name: "render ${{ inputs.topic }}"

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: System libs for headless Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation || \
          sudo apt-get install -y libasound2

      - name: Install JS deps
        run: npm ci

      - name: Install Python deps
        run: pip install -r requirements-cloud.txt

      - name: Ensure Remotion browser
        run: npx remotion browser ensure

      - name: Build (regenerate VO + music + duck/SFX, gate, smoke)
        run: python build.py

      - name: Render episode (free runner = 2 vCPU / 7GB -> concurrency 2)
        run: npx remotion render EveryLevelLawyer out/episode.mp4 --gl=swangle --concurrency=2 --log=error --timeout=300000

      - name: Master audio to -14 LUFS
        run: python audio_master.py out/episode.mp4

      - name: Thumbnail + packaging kit
        run: |
          npx remotion still Thumbnail out/thumbnail.png --timeout=120000
          python gen_packaging.py

      - name: Final deterministic gate
        run: python gate.py out/episode.mp4

      - name: Cut + render the Short (best-effort)
        continue-on-error: true
        run: |
          python shorts_cut.py
          npx remotion render Short out/short.mp4 --gl=swangle --concurrency=2 --log=error --timeout=180000
          python audio_master.py out/short.mp4 || true
          python short_gate.py out/short.mp4
          python gen_short_packaging.py

      - name: Upload render artifact (the Mac downloads this to review + publish)
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ inputs.topic }}
          if-no-files-found: error
          retention-days: 5
          path: |
            out/episode.mp4
            out/short.mp4
            out/thumbnail.png
            out/upload_kit.json
            out/short_kit.json
            out/short.json
            src/timeline.json
