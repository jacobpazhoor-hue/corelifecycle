name: render

# Free cloud render for CoreLifecycle, FRAME-SHARDED across parallel runners (the monolithic
# single-runner render took >2h and timed out). Flow: `prepare` builds the VO/music/timeline ONCE
# and renders the full audio track (audio-only, fast) + emits a shard matrix; `render` fans out N
# parallel jobs each rendering a MUTED (video-only) frame-range; `stitch` concatenates the silent
# shards, muxes the single continuous audio track (no per-seam audio artifacts), masters to
# -14 LUFS, makes the thumbnail + Short, gates, and uploads the finished files as ONE artifact
# named render-<topic>. It never touches YouTube — the Mac downloads the artifact, runs the LLM
# reviewer on the real frames, and publishes locally. Trigger: workflow_dispatch (the local
# autopilot fires it via the REST API after the creative agent commits the new content).
# Repo is PUBLIC -> unlimited free Actions minutes + parallel jobs, so sharding is free.

on:
  workflow_dispatch:
    inputs:
      topic:
        description: "slug being rendered (for the run name / artifact)"
        required: false
        default: "episode"

run-name: "render ${{ inputs.topic }}"

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libs for headless Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation || \
          sudo apt-get install -y libasound2
      - name: Install JS deps
        run: npm ci
      - name: Install Python deps
        run: pip install -r requirements-cloud.txt
      - name: Ensure Remotion browser
        run: npx remotion browser ensure
      - name: Build (regenerate VO + music + duck/SFX, gate, smoke)
        run: python build.py
      - name: Render full audio track (audio-only, fast)
        run: npx remotion render EveryLevelLawyer out/full_audio.wav --log=error --timeout=300000
      - name: Plan shards from timeline totalFrames
        id: plan
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, math, sys
          tl = json.load(open("src/timeline.json"))
          total = int(tl["totalFrames"])
          shards = max(6, min(16, math.ceil(total / 1800)))
          per = math.ceil(total / shards)
          inc = []
          for i in range(shards):
              s = i * per
              e = min(total - 1, s + per - 1)
              if s > e:
                  break
              inc.append({"idx": i, "start": s, "end": e})
          print("matrix=" + json.dumps({"include": inc}))          # -> $GITHUB_OUTPUT (key=value)
          print(f"planned {len(inc)} shards over {total} frames (~{per}/shard)", file=sys.stderr)
          PY
      - name: Upload prepared assets (audio/music/timeline/full_audio)
        uses: actions/upload-artifact@v4
        with:
          name: prepared
          if-no-files-found: error
          retention-days: 1
          path: |
            public/audio/**
            public/music/**
            src/timeline.json
            out/full_audio.wav

  render:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: true
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: System libs for headless Chromium
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation || \
          sudo apt-get install -y libasound2
      - name: Install JS deps
        run: npm ci
      - name: Ensure Remotion browser
        run: npx remotion browser ensure
      - name: Download prepared assets
        uses: actions/download-artifact@v4
        with:
          name: prepared
      - name: Render shard ${{ matrix.idx }} (frames ${{ matrix.start }}-${{ matrix.end }}, muted/video-only)
        run: |
          mkdir -p out
          npx remotion render EveryLevelLawyer out/shard_${{ matrix.idx }}.mp4 \
            --frames=${{ matrix.start }}-${{ matrix.end }} --muted \
            --gl=swangle --concurrency=$(nproc) --log=error --timeout=300000
      - name: Upload shard ${{ matrix.idx }}
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.idx }}
          if-no-files-found: error
          retention-days: 1
          path: out/shard_${{ matrix.idx }}.mp4

  stitch:
    needs: render
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: System libs + ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg \
            libnss3 libdbus-1-3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 libgbm1 \
            libpango-1.0-0 libcairo2 libasound2t64 fonts-liberation || \
          sudo apt-get install -y ffmpeg libasound2
      - name: Install JS deps
        run: npm ci
      - name: Install Python deps
        run: pip install -r requirements-cloud.txt
      - name: Ensure Remotion browser
        run: npx remotion browser ensure
      - name: Download all shard + prepared artifacts
        uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Restore prepared assets into workspace
        run: |
          cp -r dl/prepared/public/audio/* public/audio/ 2>/dev/null || true
          mkdir -p public/music && cp -r dl/prepared/public/music/* public/music/ 2>/dev/null || true
          cp dl/prepared/src/timeline.json src/timeline.json
      - name: Concatenate video shards + mux the full audio track
        run: |
          mkdir -p out
          python - <<'PY'
          import os, json, subprocess
          tl = json.load(open("src/timeline.json"))
          total = int(tl["totalFrames"])
          # discover shards in ORDER by their index
          shards = []
          i = 0
          while True:
              p = f"dl/shard-{i}/shard_{i}.mp4"
              if not os.path.exists(p):
                  break
              shards.append(p); i += 1
          assert shards, "no shard mp4s found"
          with open("out/list.txt", "w") as f:
              for p in shards:
                  f.write(f"file '{os.path.abspath(p)}'\n")
          print("concatenating", len(shards), "muted video shards", flush=True)
          # video-only concat (all shards muted -> identical params -> stream copy is safe)
          subprocess.run(["ffmpeg","-y","-f","concat","-safe","0","-i","out/list.txt",
                          "-an","-c:v","copy","out/silent.mp4"], check=True)
          # mux the single continuous audio track rendered in `prepare`
          subprocess.run(["ffmpeg","-y","-i","out/silent.mp4","-i","dl/prepared/out/full_audio.wav",
                          "-c:v","copy","-c:a","aac","-b:a","256k","-shortest","out/episode.mp4"], check=True)
          sz = os.path.getsize("out/episode.mp4")
          print(f"episode.mp4 = {sz//1_000_000} MB", flush=True)
          assert sz > 30_000_000, "stitched episode suspiciously small"
          PY
      - name: Master audio to -14 LUFS
        run: python audio_master.py out/episode.mp4
      - name: Thumbnail + packaging kit
        run: |
          npx remotion still Thumbnail out/thumbnail.png --timeout=120000
          python gen_packaging.py
      - name: Final deterministic gate
        run: python gate.py out/episode.mp4
      - name: Cut + render the Short (best-effort)
        continue-on-error: true
        run: |
          python shorts_cut.py
          npx remotion render Short out/short.mp4 --gl=swangle --concurrency=$(nproc) --log=error --timeout=180000
          python audio_master.py out/short.mp4 || true
          python short_gate.py out/short.mp4
          python gen_short_packaging.py
      - name: Upload render artifact (the Mac downloads this to review + publish)
        uses: actions/upload-artifact@v4
        with:
          name: render-${{ inputs.topic }}
          if-no-files-found: error
          retention-days: 5
          path: |
            out/episode.mp4
            out/short.mp4
            out/thumbnail.png
            out/upload_kit.json
            out/short_kit.json
            out/short.json
            src/timeline.json
